name: Build and Push Docker Image

on:
  # Weekly builds on Sundays at 2 AM UTC
  schedule:
    - cron: '0 2 * * 0'

  # Manual trigger
  workflow_dispatch:

  # Build on pushes to main branch
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'scripts/**'
      - 'package-lists/**'
      - '.github/workflows/build-and-push.yml'

  # Build on pull requests to test changes
  pull_request:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'scripts/**'
      - 'package-lists/**'
      - '.github/workflows/build-and-push.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  telemetry:
    name: Log Pipeline Metrics
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log pipeline start metric
        run: |
          chmod +x .github/send_pipeline_metrics.sh
          ./.github/send_pipeline_metrics.sh
        env:
          TELEMETRY_AZURE_CLIENT_ID: ${{ secrets.TELEMETRY_AZURE_CLIENT_ID }}
          TELEMETRY_AZURE_CLIENT_SECRET: ${{ secrets.TELEMETRY_AZURE_CLIENT_SECRET }}
          TELEMETRY_AZURE_SCOPE: ${{ secrets.TELEMETRY_AZURE_SCOPE }}
          TELEMETRY_AZURE_TENANT_ID: ${{ secrets.TELEMETRY_AZURE_TENANT_ID }}
          TELEMETRY_API_URL: ${{ secrets.TELEMETRY_API_URL }}
          SERVICE_VERSION: ${{ secrets.SERVICE_VERSION || '1.0.0' }}
          TELEMETRY_ID: ${{ secrets.TELEMETRY_ID }}

  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: all
            base_image: "ghcr.io/r-lib/rig/r:latest"
            tag_prefix: ""
            tag_latest: "latest"
          - variant: release
            base_image: "ghcr.io/r-lib/rig/release"
            tag_prefix: "release-"
            tag_latest: "release"

    name: "build-and-push (${{ matrix.variant }})"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,prefix=${{ matrix.tag_prefix }}
            type=schedule,pattern=${{ matrix.tag_prefix }}weekly-{{date 'YYYY-MM-DD'}}
            type=sha,prefix=${{ matrix.tag_prefix }}{{branch}}-
            type=raw,value=${{ matrix.tag_latest }},enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=R Package Development Environment (${{ matrix.variant }})
            org.opencontainers.image.description=Docker image based on rig-r with pre-installed R package development dependencies (${{ matrix.variant }} R versions)
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: BASE_IMAGE=${{ matrix.base_image }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
          load: ${{ github.event_name == 'pull_request' }}

      - name: Push Docker image
        id: push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: BASE_IMAGE=${{ matrix.base_image }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}

      - name: Generate artifact attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Summary
        if: success()
        run: |
          echo "## Docker Build Summary (${{ matrix.variant }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Variant:** ${{ matrix.variant }} (base: \`${{ matrix.base_image }}\`)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Status:** Success" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "**Registry:** Image pushed to GitHub Container Registry" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Usage:** \`docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.tag_latest }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Registry:** Image built but not pushed (PR)" >> $GITHUB_STEP_SUMMARY
          fi

  cleanup:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always() && github.event_name == 'schedule'
    permissions:
      packages: write

    steps:
      - name: Delete old weekly images
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ github.event.repository.name }}
          package-type: 'container'
          min-versions-to-keep: 20
          delete-only-pre-release-versions: false
          token: ${{ secrets.GITHUB_TOKEN }}
